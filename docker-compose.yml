services:
  db:
    image: postgres:16
    container_name: ellineup-db
    environment:
      POSTGRES_USER: ellineup
      POSTGRES_PASSWORD: ellineup123
      POSTGRES_DB: ellineup
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: ellineup-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ellineup
      DB_PASSWORD: ellineup123
      DB_NAME: ellineup
    depends_on:
      - db

volumes:
  pgdata:
